<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>XXXVI-Ordenen · Operationscenter</title>
  <style>
    :root {
      --bg: #0a0a0a;
      --panel: rgba(12, 12, 12, 0.84);
      --panel-strong: rgba(7, 7, 7, 0.72);
      --panel-border: rgba(212, 175, 55, 0.35);
      --gold: #d4af37;
      --gold-soft: #f2deb0;
      --text: #f6f1e4;
      --muted: #b8ae92;
      --danger: #d96c6c;
      --success: #98c379;
      --shadow: 0 0 40px rgba(212, 175, 55, 0.12);
    }

    * { box-sizing: border-box; }

    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Georgia, "Times New Roman", serif;
      color: var(--text);
      background:
        radial-gradient(circle at top, rgba(212, 175, 55, 0.12), transparent 35%),
        linear-gradient(180deg, #111 0%, #090909 50%, #050505 100%);
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 48px 24px;
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
      background-size: 36px 36px;
      mask-image: radial-gradient(circle at center, black 40%, transparent 90%);
      opacity: 0.22;
    }

    #embers {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: -1;
      opacity: 0.35;
    }

    .wrap {
      width: 100%;
      max-width: 980px;
    }

    .card {
      position: relative;
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: 24px;
      padding: 56px 28px 40px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(6px);
      overflow: hidden;
    }

    .card::before,
    .card::after {
      content: "";
      position: absolute;
      width: 220px;
      height: 220px;
      border-radius: 999px;
      background: radial-gradient(circle, rgba(212,175,55,0.09), transparent 70%);
      pointer-events: none;
    }

    .card::before { top: -140px; right: -80px; }
    .card::after { bottom: -120px; left: -80px; }

    .order-mark {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    .order-mark::before {
      content: "";
      position: absolute;
      left: 50%;
      top: 48%;
      width: 390px;
      height: 390px;
      transform: translate(-50%, -50%);
      background: url("logo.png") center / contain no-repeat;
      opacity: 0.045;
      filter: grayscale(1) brightness(1.1) blur(0.2px);
      transition: opacity 0.35s ease, transform 0.35s ease;
      mask-image: radial-gradient(circle, black 55%, transparent 85%);
    }

    .top-header {
      position: relative;
      z-index: 2;
      text-align: center;
      margin-bottom: 28px;
    }

    .sigil {
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
      padding-top: 4px;
      margin-bottom: 12px;
      font-size: 42px;
      color: var(--gold);
      letter-spacing: 6px;
      text-shadow: 0 0 18px rgba(212, 175, 55, 0.25);
      animation: sigilGlow 6s ease-in-out infinite;
    }

    .sigil-ring {
      position: absolute;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: 2px solid rgba(255,215,100,0.8);
      opacity: 0;
      pointer-events: none;
    }

    .sigil::after {
      content: "";
      position: absolute;
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(212,175,55,0.15), transparent 70%);
      filter: blur(18px);
      z-index: -1;
      animation: sigilAura 8s ease-in-out infinite;
    }

    h1 {
      margin: 0;
      text-align: center;
      font-size: clamp(1.45rem, 5vw, 3.2rem);
      letter-spacing: clamp(0.04em, 0.8vw, 0.12em);
      color: var(--gold-soft);
      text-transform: uppercase;
      text-shadow: 0 0 12px rgba(212,175,55,0.15);
      white-space: nowrap;
    }

    .subheading {
      margin: 10px auto 0;
      max-width: 620px;
      color: var(--muted);
      line-height: 1.6;
      text-align: center;
      font-size: 0.98rem;
    }

    .label {
      display: block;
      margin-bottom: 10px;
      font-size: 0.95rem;
      color: var(--gold-soft);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .input-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
    }

    input {
      width: 100%;
      padding: 16px 18px;
      border-radius: 14px;
      border: 1px solid rgba(212, 175, 55, 0.25);
      background: rgba(0, 0, 0, 0.45);
      color: var(--text);
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease, transform 0.2s ease;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    input:focus {
      border-color: rgba(212, 175, 55, 0.7);
      box-shadow: 0 0 0 4px rgba(212, 175, 55, 0.12);
      transform: translateY(-1px);
    }

    button {
      padding: 16px 22px;
      border-radius: 14px;
      border: 1px solid rgba(212, 175, 55, 0.45);
      background: linear-gradient(180deg, rgba(212,175,55,0.18), rgba(212,175,55,0.08));
      color: var(--gold-soft);
      font-size: 0.98rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.2s ease, border-color 0.2s ease, opacity 0.2s ease;
      white-space: nowrap;
    }

    button:active { transform: translateY(1px) scale(0.99); }
    button:hover {
      transform: translateY(-1px);
      border-color: rgba(212, 175, 55, 0.75);
      box-shadow: 0 10px 30px rgba(212, 175, 55, 0.1);
    }
    button:disabled { opacity: 0.65; cursor: default; transform: none; }

    .status {
      min-height: 28px;
      margin-top: 14px;
      font-size: 0.98rem;
      line-height: 1.5;
    }
    .status.error { color: var(--danger); }
    .status.success { color: var(--success); }

    .divider {
      display: flex;
      align-items: center;
      gap: 14px;
      margin: 30px 0 24px;
      color: var(--gold);
      opacity: 0.9;
    }
    .divider::before,
    .divider::after {
      content: "";
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(212,175,55,0.5), transparent);
    }

    #lockedView,
    #revealedView {
      position: relative;
      z-index: 2;
    }

    .hidden { display: none; }

    .hero-logo {
      width: min(220px, 56vw);
      display: block;
      margin: 0 auto 18px;
      filter: drop-shadow(0 0 22px rgba(212, 175, 55, 0.18));
    }

    .brief-title {
      margin: 0;
      text-align: center;
      font-size: clamp(1.3rem, 4vw, 2.2rem);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--gold-soft);
    }

    .brief-subtitle {
      margin: 10px auto 0;
      color: var(--muted);
      text-align: center;
      max-width: 680px;
      line-height: 1.7;
    }

    .section {
      margin-top: 28px;
      border: 1px solid rgba(212, 175, 55, 0.18);
      border-radius: 18px;
      background: rgba(255,255,255,0.025);
      overflow: hidden;
    }

    .section-header {
      padding: 16px 18px;
      border-bottom: 1px solid rgba(212, 175, 55, 0.13);
      background: rgba(0, 0, 0, 0.18);
      color: var(--gold-soft);
      letter-spacing: 0.09em;
      text-transform: uppercase;
      font-weight: 700;
      font-size: 0.96rem;
    }

    .section-body { padding: 18px; }

    .intel-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }

    .intel-card {
      padding: 14px 12px;
      border: 1px solid rgba(212, 175, 55, 0.16);
      border-radius: 14px;
      background: rgba(0,0,0,0.22);
      text-align: center;
    }

    .intel-value {
      display: block;
      color: var(--gold-soft);
      font-size: clamp(1.3rem, 2vw, 2rem);
      font-weight: bold;
      line-height: 1.2;
    }

    .intel-label {
      display: block;
      margin-top: 8px;
      color: var(--muted);
      font-size: 0.78rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      line-height: 1.35;
    }

    .countdown-card {
      grid-column: 1 / -1;
      padding: 18px 16px;
      background:
        radial-gradient(circle at center, rgba(212,175,55,0.07), transparent 72%),
        rgba(0,0,0,0.26);
    }

    .countdown-value {
      font-size: 1rem;
    }

    .countdown-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      align-items: center;
    }

    .countdown-part {
      display: block;
      padding: 8px 6px;
      border: 1px solid rgba(212,175,55,0.14);
      border-radius: 12px;
      background: rgba(0,0,0,0.22);
    }

    .countdown-number {
      display: block;
      color: var(--gold-soft);
      font-size: clamp(1.35rem, 4vw, 2.25rem);
      font-weight: 700;
      line-height: 1;
      font-variant-numeric: tabular-nums;
      text-shadow: 0 0 14px rgba(212,175,55,0.16);
    }

    .countdown-unit {
      display: block;
      margin-top: 6px;
      color: var(--muted);
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .countdown-active {
      grid-template-columns: 1fr;
    }

    .current-team {
      margin-top: 14px;
      padding: 12px 14px;
      border-left: 3px solid rgba(212,175,55,0.65);
      background: rgba(212,175,55,0.06);
      color: var(--muted);
      line-height: 1.65;
    }
    .current-team strong { color: var(--gold-soft); }

    .timeline {
      position: relative;
      margin: 0;
      padding: 0;
      list-style: none;
    }
    .timeline::before {
      content: "";
      position: absolute;
      top: 10px;
      bottom: 10px;
      left: 72px;
      width: 1px;
      background: linear-gradient(180deg, transparent, rgba(212,175,55,0.45), transparent);
    }

    .timeline-item {
      position: relative;
      display: grid;
      grid-template-columns: 88px 1fr;
      gap: 16px;
      padding: 13px 0;
    }

    .timeline-time {
      color: var(--gold-soft);
      font-weight: 700;
      letter-spacing: 0.06em;
      font-size: 0.95rem;
      text-align: right;
      padding-right: 14px;
    }

    .timeline-content {
      position: relative;
      color: var(--muted);
      line-height: 1.65;
      padding-left: 18px;
    }
    .timeline-content::before {
      content: "";
      position: absolute;
      left: -21px;
      top: 5px;
      width: 9px;
      height: 9px;
      border-radius: 50%;
      border: 1px solid rgba(212,175,55,0.85);
      background: rgba(12,12,12,0.96);
      box-shadow: 0 0 12px rgba(212,175,55,0.25);
    }

    .operations-note {
      margin-bottom: 24px;
      padding: 14px 18px;
      border-left: 3px solid var(--gold);
      background: rgba(212, 175, 55, 0.05);
      color: var(--muted);
      font-size: 0.92rem;
      line-height: 1.6;
      border-radius: 0 8px 8px 0;
    }

    .team-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }

    .team-card {
      border: 1px solid rgba(212,175,55,0.16);
      border-radius: 18px;
      background: rgba(0,0,0,0.2);
      padding: 16px;
      min-width: 0;
    }

    .team-card.active {
      border-color: rgba(212,175,55,0.5);
      box-shadow: 0 0 28px rgba(212,175,55,0.09);
    }

    .team-logo {
      width: min(150px, 65%);
      aspect-ratio: 1 / 1;
      display: block;
      object-fit: contain;
      margin: 0 auto 12px;
      border-radius: 50%;
      filter: drop-shadow(0 0 14px rgba(212,175,55,0.16));
    }

    .team-name {
      margin: 0;
      text-align: center;
      color: var(--gold-soft);
      font-size: 1.05rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .team-motto {
      margin: 8px 0 12px;
      text-align: center;
      color: rgba(184,174,146,0.82);
      font-style: italic;
      font-size: 0.92rem;
    }

    .member-list {
      margin: 0;
      padding: 0;
      list-style: none;
      border-top: 1px solid rgba(212,175,55,0.12);
    }

    .member-list li {
      padding: 8px 0;
      color: var(--muted);
      line-height: 1.35;
      border-bottom: 1px solid rgba(255,255,255,0.04);
    }
    .member-list li::before {
      content: "✦";
      color: rgba(212,175,55,0.7);
      margin-right: 8px;
      font-size: 0.75rem;
    }

    .classified-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }

    .classified-card {
      padding: 14px;
      border-radius: 14px;
      border: 1px solid rgba(212,175,55,0.16);
      background: rgba(0,0,0,0.22);
    }

    .classified-title {
      color: var(--gold-soft);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-size: 0.86rem;
      margin-bottom: 10px;
    }

    .redacted {
      display: block;
      width: 100%;
      height: 11px;
      margin: 7px 0;
      border-radius: 999px;
      background: linear-gradient(90deg, rgba(212,175,55,0.3), rgba(212,175,55,0.08));
      opacity: 0.75;
    }

    .classified-note {
      margin-top: 10px;
      color: var(--muted);
      font-size: 0.88rem;
      line-height: 1.6;
    }

    .info-list {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }

    .info-item {
      padding: 14px;
      border: 1px solid rgba(212,175,55,0.14);
      border-radius: 14px;
      background: rgba(0,0,0,0.18);
      color: var(--muted);
      line-height: 1.6;
    }
    .info-item strong {
      display: block;
      color: var(--gold-soft);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 6px;
      font-size: 0.85rem;
    }

    .doctrine {
      margin: 0;
      padding-left: 22px;
      color: var(--muted);
      line-height: 1.8;
    }
    .doctrine li::marker { color: var(--gold); }

    .footer {
      margin-top: 24px;
      text-align: center;
      color: rgba(242, 222, 176, 0.75);
      font-size: 0.92rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .tiny {
      margin-top: 8px;
      font-size: 0.8rem;
      color: rgba(184, 174, 146, 0.72);
      text-align: center;
    }

    .secondary-btn {
      margin-top: 22px;
      width: 100%;
      padding: 12px 16px;
      border-radius: 12px;
      border: 1px solid rgba(212, 175, 55, 0.2);
      background: transparent;
      color: var(--muted);
      font-size: 0.85rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .secondary-btn:hover {
      border-color: rgba(212, 175, 55, 0.5);
      color: var(--gold-soft);
    }

    .seal-flash {
      position: absolute;
      inset: 0;
      pointer-events: none;
      opacity: 0;
      background:
        radial-gradient(circle at center, rgba(212, 175, 55, 0.22), rgba(212, 175, 55, 0.08) 24%, transparent 55%),
        radial-gradient(circle at center, rgba(255, 245, 210, 0.12), transparent 60%);
      z-index: 3;
    }

    .seal-crack {
      position: absolute;
      left: 50%;
      top: 40px;
      width: 260px;
      height: 120px;
      transform: translateX(-50%) scale(0.8) rotate(-6deg);
      opacity: 0;
      pointer-events: none;
      z-index: 4;
    }
    .seal-crack::before,
    .seal-crack::after {
      content: "";
      position: absolute;
      inset: 0;
      background-repeat: no-repeat;
      background-position: center;
      background-size: contain;
    }
    .seal-crack::before {
      background-image:
        linear-gradient(115deg,
          transparent 0%, transparent 42%,
          rgba(255, 220, 120, 0.0) 44%,
          rgba(255, 220, 120, 0.95) 46%,
          rgba(120, 70, 20, 0.8) 48%,
          rgba(255, 220, 120, 0.95) 50%,
          rgba(255, 220, 120, 0.0) 52%,
          transparent 55%, transparent 100%);
      filter: blur(0.3px);
    }
    .seal-crack::after {
      background-image:
        linear-gradient(70deg,
          transparent 0%, transparent 47%,
          rgba(255, 220, 120, 0.0) 49%,
          rgba(255, 235, 170, 0.7) 50%,
          rgba(255, 220, 120, 0.0) 51%,
          transparent 53%, transparent 100%);
      transform: translateY(8px) translateX(10px) scale(0.92);
      opacity: 0.65;
    }

    .card.breaking::before { animation: crestGlow 0.7s ease; }
    .card.breaking { animation: sealPulse 0.7s ease; }
    .card.breaking .seal-flash { animation: sealFlash 0.7s ease; }
    .card.breaking .top-header { animation: ritualLift 0.7s ease; }
    .card.breaking #revealedView { animation: revealSection 0.55s ease; }
    .card.breaking .sigil-ring { animation: sigilBurst 0.9s ease-out; }
    .card.breaking .seal-crack { animation: crackAppear 0.75s ease-out; }
    .card.breaking .order-mark::before {
      opacity: 0.18;
      transform: translate(-50%, -50%) scale(1.05);
      transition: opacity 0.25s ease, transform 0.25s ease;
    }

    @keyframes crackAppear {
      0% { opacity: 0; transform: translateX(-50%) scale(0.6) rotate(-8deg); }
      20% { opacity: 1; transform: translateX(-50%) scale(1.02) rotate(-5deg); }
      55% { opacity: 0.95; transform: translateX(-50%) scale(1) rotate(-6deg); }
      100% { opacity: 0; transform: translateX(-50%) scale(1.06) rotate(-6deg); }
    }
    @keyframes sigilGlow {
      0% { text-shadow: 0 0 12px rgba(212,175,55,0.15), 0 0 22px rgba(212,175,55,0.15); transform: scale(1); }
      50% { text-shadow: 0 0 22px rgba(212,175,55,0.45), 0 0 38px rgba(212,175,55,0.25); transform: scale(1.02); }
      100% { text-shadow: 0 0 12px rgba(212,175,55,0.15), 0 0 22px rgba(212,175,55,0.15); transform: scale(1); }
    }
    @keyframes sigilAura {
      0% { transform: scale(0.9); opacity: 0.4; }
      50% { transform: scale(1.15); opacity: 0.7; }
      100% { transform: scale(0.9); opacity: 0.4; }
    }
    @keyframes sigilBurst {
      0% { opacity: 0.9; transform: scale(0.2); border-width: 3px; }
      50% { opacity: 0.6; }
      100% { opacity: 0; transform: scale(9); border-width: 1px; }
    }
    @keyframes sealFlash {
      0% { opacity: 0; transform: scale(0.96); }
      18% { opacity: 1; transform: scale(1.01); }
      100% { opacity: 0; transform: scale(1.04); }
    }
    @keyframes sealPulse {
      0% { transform: scale(1); box-shadow: var(--shadow); }
      25% { transform: scale(1.008); box-shadow: 0 0 60px rgba(212, 175, 55, 0.2); }
      100% { transform: scale(1); box-shadow: var(--shadow); }
    }
    @keyframes crestGlow {
      0% { opacity: 1; }
      30% { opacity: 1; filter: brightness(1.35); }
      100% { opacity: 1; filter: brightness(1); }
    }
    @keyframes ritualLift {
      0% { transform: translateY(0); }
      30% { transform: translateY(-2px); }
      100% { transform: translateY(0); }
    }
    @keyframes revealSection {
      0% { opacity: 0; transform: translateY(12px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 840px) {
      .intel-grid { grid-template-columns: repeat(2, 1fr); }
      .team-grid { grid-template-columns: 1fr; }
      .classified-grid { grid-template-columns: 1fr; }
    }

    @media (max-width: 640px) {
      body { padding: 28px 16px; }
      .card { padding: 44px 18px 28px; border-radius: 20px; }
      .input-row { grid-template-columns: 1fr; }
      button { width: 100%; }
      .sigil { font-size: 32px; }
      .top-header { margin-bottom: 22px; }
      input, input::placeholder { font-size: 0.86rem; letter-spacing: 0.03em; }
      h1 { font-size: 1.45rem; letter-spacing: 0.03em; }
      .order-mark::before { width: 260px; height: 260px; top: 46%; }
      .seal-crack { width: 180px; height: 90px; top: 92px; }
      .countdown-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .countdown-card { padding: 16px 12px; }
      .timeline::before { left: 56px; }
      .timeline-item { grid-template-columns: 70px 1fr; gap: 10px; }
      .timeline-time { font-size: 0.84rem; padding-right: 10px; }
      .timeline-content { padding-left: 14px; }
      .timeline-content::before { left: -16px; }
      .info-list { grid-template-columns: 1fr; }
      .section-body { padding: 14px; }
      .hero-logo { width: min(190px, 62vw); }
    }
  </style>
</head>
<body>
  <canvas id="embers"></canvas>
  <main class="wrap">
    <section class="card">
      <div id="sealFlash" class="seal-flash"></div>
      <div id="sealCrack" class="seal-crack"></div>
      <div class="order-mark" aria-hidden="true"></div>

      <div class="top-header">
        <div class="sigil">
          ☉ XXXVI ☉
          <span class="sigil-ring"></span>
        </div>
        <h1>- FORTROLIGT -</h1>
        <p class="subheading">Operationscenter for indviede gæster. Adgang kræver ordenens kode.</p>
      </div>

      <div id="lockedView">
        <label class="label" for="code">Adgangskode</label>
        <div class="input-row">
          <input id="code" name="code" type="text" placeholder="Koden fra Deres indkaldelse" autocomplete="off" />
          <button id="submitBtn" type="button">Bryd segl</button>
        </div>
        <div id="status" class="status" aria-live="polite"></div>
      </div>

      <div id="revealedView" class="hidden">
        <div class="divider">✦</div>
        <div id="operationsContent"></div>
        <button id="resetBtn" type="button" class="secondary-btn">Luk operationscenter</button>
        <div class="footer">Fortes Fortuna Adiuvat</div>
        <div class="tiny">Lørdag d. 13. juni · Mellemløkken 3 · Årslev</div>
      </div>
    </section>
  </main>

  <script>
    const contactPhone = "28 70 88 10";
    const eventStart = new Date("2026-06-13T14:00:00+02:00");

    const invitationMap = {
      HACK999: { teamKey: "hackermen", team: "Team Hackermen" },
      LAERER123: { teamKey: "laerermaend", team: "Team Lærermænd" },
      FAM1234: { teamKey: "lafamilia", team: "Team La Familia" },
      OEL123: { teamKey: "lafamilia", team: "Team La Familia", note: "Ølloge er nedlagt, og de resterende kræfter er overført til La Familia." }
    };

    const teams = [
      {
        key: "hackermen",
        name: "Team Hackermen",
        motto: "Per Codicem ad Victoriam",
        logo: "team-hackermen-logo.png",
        members: ["Henrik R. Christensen", "Mathias Sundby", "Lasse Hvilsted", "Morten Andersen"]
      },
      {
        key: "lafamilia",
        name: "Team La Familia",
        motto: "Sanguis Supra Omnia",
        logo: "team-la-familia-logo.png",
        members: ["Jonas Honoré", "Joakim Honoré", "Jakob Hjaltason", "Kristian Hjaltason", "Mads Helskov Christensen"]
      },
      {
        key: "laerermaend",
        name: "Team Lærermænd",
        motto: "Scientia Potentia Est",
        logo: "team-laerermaend-logo.png",
        members: ["Peter Schrøder", "Christian Hjære Jensen", "Kristoffer Mygind Bødker", "Mathias Struve Larsen"]
      }
    ];

    const schedule = [
      ["14:00", "Ankomst og velkomst ved Stormesteren med snacks og velkomstdrinks."],
      ["15:00", "Stormesteropgaverne igangsættes. Teams dyster om pointene."],
      ["16:30", "Afslapning, snacks, havespil og hygge."],
      ["18:00", "Tapas fra Osteporten serveres og nydes."],
      ["19:30", "Stormesteropgaverne genoptages og afsluttes."],
      ["21:00", "Ølstafet i hold."],
      ["21:30", "Point tælles sammen, og vinderholdet udnævnes."],
      ["22:00", "Den officielle ceremoni afsluttes. Ordenen overgår herefter til fri social aktivitet: høj musik, bajere, spil og hygge, indendørs eller udendørs afhængigt af vejret."],
      ["03:00", "Ordenen opløses. Gæster kan crashe på sofaen ved behov."]
    ];

    const codeInput = document.getElementById("code");
    const submitBtn = document.getElementById("submitBtn");
    const statusEl = document.getElementById("status");
    const lockedView = document.getElementById("lockedView");
    const revealedView = document.getElementById("revealedView");
    const operationsContent = document.getElementById("operationsContent");
    const card = document.querySelector(".card");
    const resetBtn = document.getElementById("resetBtn");
    let countdownTimer = null;

    codeInput.focus();

    resetBtn.addEventListener("click", () => {
      revealedView.classList.add("hidden");
      lockedView.classList.remove("hidden");
      submitBtn.disabled = false;
      codeInput.disabled = false;
      codeInput.value = "";
      showStatus("");
      if (countdownTimer) {
        clearInterval(countdownTimer);
        countdownTimer = null;
      }
      codeInput.focus();
    });

    function normalizeCode(value) {
      return value
        .trim()
        .toUpperCase()
        .replace(/\s+/g, "")
        .replace(/Æ/g, "AE")
        .replace(/Ø/g, "OE")
        .replace(/Å/g, "AA");
    }

    function showStatus(message, type = "") {
      statusEl.textContent = message;
      statusEl.className = `status ${type}`.trim();
    }

    function getCountdownHtml() {
      const now = new Date();
      const diff = eventStart - now;

      if (diff <= 0) {
        return `<span class="countdown-grid countdown-active"><span class="countdown-part"><span class="countdown-number">LIVE</span><span class="countdown-unit">Mission aktiv</span></span></span>`;
      }

      const days = Math.floor(diff / (1000 * 60 * 60 * 24));
      const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
      const minutes = Math.floor((diff / (1000 * 60)) % 60);
      const seconds = Math.floor((diff / 1000) % 60);

      return `
        <span class="countdown-grid">
          <span class="countdown-part"><span class="countdown-number">${days}</span><span class="countdown-unit">dage</span></span>
          <span class="countdown-part"><span class="countdown-number">${String(hours).padStart(2, "0")}</span><span class="countdown-unit">timer</span></span>
          <span class="countdown-part"><span class="countdown-number">${String(minutes).padStart(2, "0")}</span><span class="countdown-unit">min</span></span>
          <span class="countdown-part"><span class="countdown-number">${String(seconds).padStart(2, "0")}</span><span class="countdown-unit">sek</span></span>
        </span>
      `;
    }

    function updateCountdownDisplay() {
      const countdownValue = document.getElementById("countdownValue");
      if (countdownValue) {
        countdownValue.innerHTML = getCountdownHtml();
      }
    }

    function section(title, body) {
      return `
        <section class="section">
          <div class="section-header">${title}</div>
          <div class="section-body">${body}</div>
        </section>
      `;
    }

    function buildStatus(match) {
      const totalMembers = teams.reduce((sum, team) => sum + team.members.length, 0);
      return section("Aktuel efterretning", `
        <div class="intel-grid">
          <div class="intel-card"><span class="intel-value">3</span><span class="intel-label">Hold registreret</span></div>
          <div class="intel-card"><span class="intel-value">${totalMembers}</span><span class="intel-label">Agenter registreret</span></div>
          <div class="intel-card"><span class="intel-value">13/6</span><span class="intel-label">Missionsdag</span></div>
          <div class="intel-card countdown-card"><span class="intel-value countdown-value" id="countdownValue">${getCountdownHtml()}</span><span class="intel-label">Live nedtælling til samling</span></div>
        </div>
        <div class="current-team">
          Adgang godkendt for <strong>${match.team}</strong>. ${match.note ? match.note : "Deres tilknytning er bekræftet i ordenens protokol."}
        </div>
      `);
    }

    function buildTimeline() {
      const items = schedule.map(([time, text]) => `
        <li class="timeline-item">
          <div class="timeline-time">${time}</div>
          <div class="timeline-content">${text}</div>
        </li>
      `).join("");

      return section(
        "Foreløbig Operationsplan",
        `
          <div class="operations-note">
            ⚠ OPERATIONSPLANEN ER BASERET PÅ DE SENESTE EFTERRETNINGER.
            TIDSPUNKTER OG AKTIVITETER KAN ÆNDRES EFTER STORMESTERENS SKØN.
          </div>

          <ol class="timeline">
            ${items}
          </ol>
        `
      );
    }

    function buildTeams(activeKey) {
      const cards = teams.map(team => `
        <article class="team-card ${team.key === activeKey ? "active" : ""}">
          <img src="${team.logo}" alt="Logo for ${team.name}" class="team-logo" />
          <h3 class="team-name">${team.name}</h3>
          <p class="team-motto">${team.motto}</p>
          <ul class="member-list">
            ${team.members.map(member => `<li>${member}</li>`).join("")}
          </ul>
        </article>
      `).join("");

      return section("Registrerede ordensafdelinger", `<div class="team-grid">${cards}</div>`);
    }

    function buildClassified() {
      return section("Klassificerede oplysninger", `
        <div class="classified-grid">
          <div class="classified-card">
            <div class="classified-title">Stormesteropgaver</div>
            <span class="redacted"></span><span class="redacted"></span><span class="redacted"></span>
            <div class="classified-note">Detaljer frigives først ved igangsættelse.</div>
          </div>
          <div class="classified-card">
            <div class="classified-title">Præmier</div>
            <span class="redacted"></span><span class="redacted"></span><span class="redacted"></span>
            <div class="classified-note">Ære, hæder og muligvis noget mere håndgribeligt.</div>
          </div>
          <div class="classified-card">
            <div class="classified-title">Straffe</div>
            <span class="redacted"></span><span class="redacted"></span><span class="redacted"></span>
            <div class="classified-note">Nederlag bør undgås. Yderligere information er klassificeret.</div>
          </div>
        </div>
      `);
    }

    function buildPractical() {
      return section("Logistiske oplysninger", `
        <div class="info-list">
          <div class="info-item"><strong>Adresse</strong>Mellemløkken 3<br />5792 Årslev</div>
          <div class="info-item"><strong>Parkering</strong>Fri parkering ved parkeringsplads ved indgangen til Mellemløkken (overfor fitnesscenteret).</div>
          <div class="info-item"><strong>Overnatning</strong>Gæster kan crashe på sofaen ved behov. Gulvplads kan sandsynligvis også forhandles.</div>
          <div class="info-item"><strong>Kontakt</strong>Stormester Andy<br />${contactPhone}</div>
        </div>
      `);
    }

    function buildDoctrine() {
      return section("Grundlæggende doktrin", `
        <ol class="doctrine">
          <li>Der kæmpes med ære.</li>
          <li>Stormesterens afgørelser er endelige.</li>
          <li>Holdånd og samarbejde er afgørende for succes.</li>
        </ol>
      `);
    }

    function buildOperationsHtml(match) {
      return `
        <img src="logo.png" alt="XXXVI-Ordenens logo" class="hero-logo" />
        <h2 class="brief-title">Ordenens operationsbriefing</h2>
        <p class="brief-subtitle">
          Invitationens fase er afsluttet. Operationsfasen er påbegyndt. Nedenstående oplysninger gælder for registrerede deltagere i XXXVI-Ordenens samling.
        </p>
        ${buildStatus(match)}
        ${buildTimeline()}
        ${buildTeams(match.teamKey)}
        ${buildClassified()}
        ${buildPractical()}
        ${buildDoctrine()}
      `;
    }

    function openPortal() {
      const rawCode = codeInput.value;
      const code = normalizeCode(rawCode);

      if (!code) {
        showStatus("Du skal indtaste en adgangskode for at fortsætte.", "error");
        return;
      }

      const match = invitationMap[code];

      if (!match) {
        showStatus("Koden blev ikke genkendt. Kontroller indkaldelsen og prøv igen.", "error");
        return;
      }

      showStatus("Seglet brydes...", "success");
      submitBtn.disabled = true;
      codeInput.disabled = true;
      card.classList.add("breaking");

      setTimeout(() => {
        operationsContent.innerHTML = buildOperationsHtml(match);
        lockedView.classList.add("hidden");
        revealedView.classList.remove("hidden");
        updateCountdownDisplay();
        if (countdownTimer) clearInterval(countdownTimer);
        countdownTimer = setInterval(updateCountdownDisplay, 1000);
        showStatus("");
      }, 520);

      setTimeout(() => {
        card.classList.remove("breaking");
      }, 900);
    }

    submitBtn.addEventListener("click", openPortal);
    codeInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        event.preventDefault();
        openPortal();
      }
    });

    const canvas = document.getElementById("embers");
    const ctx = canvas.getContext("2d");
    let particles = [];
    const PARTICLE_COUNT = 40;

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }

    window.addEventListener("resize", resizeCanvas);
    resizeCanvas();

    function createParticle() {
      return {
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        r: Math.random() * 1.8 + 0.4,
        speed: Math.random() * 0.25 + 0.05,
        alpha: Math.random() * 0.5 + 0.2
      };
    }

    for (let i = 0; i < PARTICLE_COUNT; i++) particles.push(createParticle());

    function animateParticles() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      for (let p of particles) {
        p.y -= p.speed;
        if (p.y < -10) {
          p.y = canvas.height + 10;
          p.x = Math.random() * canvas.width;
        }
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255, 215, 120, ${p.alpha})`;
        ctx.fill();
      }
      requestAnimationFrame(animateParticles);
    }
    animateParticles();
  </script>
</body>
</html>
